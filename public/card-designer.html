<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Featured Card Designer — GO Media</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1c1c1e; color: #eee; display: flex; min-height: 100vh;
  }
  #controls {
    width: 340px; min-width: 300px; padding: 18px 20px 40px; overflow-y: auto;
    background: #232326; border-right: 1px solid #333; height: 100vh; position: sticky; top: 0;
  }
  #controls h1 { font-size: 17px; margin: 0 0 4px; }
  #controls .sub { font-size: 12px; color: #999; margin-bottom: 14px; }
  fieldset { border: 1px solid #3a3a3d; border-radius: 8px; margin: 0 0 14px; padding: 10px 12px 12px; }
  legend { font-size: 12px; font-weight: 700; color: #f0b429; padding: 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  .row { display: flex; align-items: center; gap: 8px; margin: 7px 0; font-size: 12.5px; }
  .row label { flex: 1; color: #ccc; }
  .row input[type=range] { flex: 1.3; accent-color: #f0b429; }
  .row .val { width: 44px; text-align: right; font-variant-numeric: tabular-nums; color: #fff; font-size: 12px; }
  .row select, .row input[type=color] { background: #2c2c2e; color: #fff; border: 1px solid #444; border-radius: 5px; padding: 3px 6px; font-size: 12px; }
  .row input[type=color] { padding: 0; width: 40px; height: 24px; }
  button.btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    background: #f0b429; color: #1c1c1e; cursor: pointer; margin-top: 4px;
  }
  button.btn.secondary { background: #3a3a3d; color: #eee; margin-top: 8px; }
  button.btn:active { opacity: .8; }
  #copied { text-align: center; font-size: 12px; color: #6fdc8c; height: 16px; margin-top: 6px; }
  #previewWrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 28px; background: #121212; }
  .cardholder { flex-shrink: 0; }
  .card { position: relative; overflow: hidden; background: #222; }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .titlebar { position: absolute; left: 0; right: 0; bottom: 0; }
  .card .titlebar .solid { position: absolute; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; }
  .card .titlebar .txt {
    width: 100%; font-weight: 700; color: #fff;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    line-height: 1.2;
  }
  .card-below-title {
    font-weight: 700; color: #fff; line-height: 1.2; margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  #sizeNote { font-size: 12px; color: #888; }
  @media (max-width: 860px) { body { flex-direction: column; } #controls { width: 100%; height: auto; position: static; } }
</style>
</head>
<body>
<div id="controls">
  <h1>Featured Card Designer</h1>
  <div class="sub">Tweak the card, then hit “Copy values” (or send me the page URL).</div>

  <fieldset><legend>Card</legend>
    <div class="row"><label>Aspect ratio (w:h)</label><input type="range" id="aspect" min="1" max="2.2" step="0.01" value="1.3333"><span class="val" id="aspect_v"></span></div>
    <div class="row"><label>Corner radius</label><input type="range" id="radius" min="0" max="32" step="1" value="8"><span class="val" id="radius_v"></span></div>
    <div class="row"><label>Preview size</label><input type="range" id="previewH" min="120" max="360" step="2" value="220"><span class="val" id="previewH_v"></span></div>
  </fieldset>

  <fieldset><legend>Title</legend>
    <div class="row"><label>Position</label>
      <select id="titlePos"><option value="overlay" selected>Overlay on card</option><option value="below">Below card</option></select></div>
    <div class="row"><label>Font size</label><input type="range" id="titleSize" min="9" max="20" step="0.5" value="13"><span class="val" id="titleSize_v"></span></div>
    <div class="row"><label>Alignment</label>
      <select id="titleAlign"><option value="center" selected>Center</option><option value="left">Left</option></select></div>
    <div class="row"><label>Horizontal padding</label><input type="range" id="titleHPad" min="0" max="24" step="1" value="8"><span class="val" id="titleHPad_v"></span></div>
  </fieldset>

  <fieldset><legend>Title bar (overlay)</legend>
    <div class="row"><label>Bar color</label><input type="color" id="barColor" value="#141414"></div>
    <div class="row"><label>Bar opacity</label><input type="range" id="barOpacity" min="0" max="100" step="1" value="80"><span class="val" id="barOpacity_v"></span></div>
    <div class="row"><label>Fade height</label><input type="range" id="fadeHeight" min="0" max="40" step="1" value="12"><span class="val" id="fadeHeight_v"></span></div>
    <div class="row"><label>Bar height</label><input type="range" id="barH" min="26" max="120" step="1" value="42"><span class="val" id="barH_v"></span></div>
    <div class="row"><label>Text position (from bottom)</label><input type="range" id="textLift" min="0" max="60" step="1" value="8"><span class="val" id="textLift_v"></span></div>
  </fieldset>

  <button class="btn" id="copyBtn">📋 Copy values</button>
  <button class="btn secondary" id="resetBtn">↩︎ Reset to app defaults</button>
  <div id="copied"></div>
</div>

<div id="previewWrap">
  <div class="cardholder" id="holder1"></div>
  <div class="cardholder" id="holder2"></div>
  <div id="sizeNote">Preview size is display-only — it doesn’t affect the app.</div>
</div>

<script>
const DEFAULTS = {
  aspect: 1.3333, radius: 8, previewH: 220,
  titlePos: 'overlay', titleSize: 13, titleAlign: 'center', titleHPad: 8,
  barColor: '#141414', barOpacity: 80, fadeHeight: 12, barH: 42, textLift: 8,
};
const CARDS = [
  { seed: 'sermon1', title: 'The Good Shepherd' },
  { seed: 'study2', title: 'Walking in Faith Through Trials' },
];

function $(id) { return document.getElementById(id); }
function getState() {
  const s = {};
  for (const k of Object.keys(DEFAULTS)) {
    const el = $(k);
    if (el.tagName === 'SELECT' || el.type === 'color') s[k] = el.value;
    else s[k] = parseFloat(el.value);
  }
  return s;
}
function setState(s) {
  for (const k of Object.keys(s)) {
    const el = $(k);
    if (el) el.value = s[k];
  }
}
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function buildCard(spec, s) {
  const cardH = s.previewH;
  const cardW = cardH * s.aspect;
  const holder = document.createElement('div');
  holder.style.width = cardW + 'px';
  const card = document.createElement('div');
  card.className = 'card';
  card.style.width = cardW + 'px';
  card.style.height = cardH + 'px';
  card.style.borderRadius = s.radius + 'px';
  const img = document.createElement('img');
  img.src = `https://picsum.photos/seed/${spec.seed}/600/450`;
  img.alt = '';
  card.appendChild(img);

  if (s.titlePos === 'overlay') {
    const [r, g, b] = hexToRgb(s.barColor);
    const op = s.barOpacity / 100;
    const bar = document.createElement('div');
    bar.className = 'titlebar';
    bar.style.height = (s.barH + s.fadeHeight) + 'px';
    bar.style.background = `linear-gradient(to top, rgba(${r},${g},${b},${op}) ${s.barH}px, rgba(${r},${g},${b},0) ${s.barH + s.fadeHeight}px)`;
    const txt = document.createElement('div');
    txt.className = 'txt';
    txt.style.position = 'absolute';
    txt.style.left = s.titleHPad + 'px';
    txt.style.right = s.titleHPad + 'px';
    txt.style.width = 'auto';
    txt.style.bottom = s.textLift + 'px';
    txt.style.fontSize = s.titleSize + 'px';
    txt.style.textAlign = s.titleAlign;
    txt.textContent = spec.title;
    bar.appendChild(txt);
    card.appendChild(bar);
    holder.appendChild(card);
  } else {
    holder.appendChild(card);
    const below = document.createElement('div');
    below.className = 'card-below-title';
    below.style.fontSize = s.titleSize + 'px';
    below.style.textAlign = s.titleAlign;
    below.style.padding = `0 ${s.titleHPad}px`;
    below.textContent = spec.title;
    holder.appendChild(below);
  }
  return holder;
}

function render() {
  const s = getState();
  const fmt = { aspect: v => v.toFixed(2), titleSize: v => v + 'pt', barOpacity: v => v + '%' };
  for (const k of Object.keys(DEFAULTS)) {
    const lv = $(k + '_v');
    if (lv) lv.textContent = (fmt[k] ? fmt[k](s[k]) : s[k]);
  }
  const h1 = $('holder1'), h2 = $('holder2');
  h1.innerHTML = ''; h2.innerHTML = '';
  h1.appendChild(buildCard(CARDS[0], s));
  h2.appendChild(buildCard(CARDS[1], s));
}

document.querySelectorAll('#controls input, #controls select').forEach(el => {
  el.addEventListener('input', () => { render(); saveHash(); });
});
$('resetBtn').addEventListener('click', () => { setState(DEFAULTS); render(); saveHash(); });
$('copyBtn').addEventListener('click', () => {
  const s = getState();
  const summary =
`Featured Card Design values:
- Card: aspect ${s.aspect.toFixed(2)}:1, corner radius ${s.radius}
- Title: ${s.titleSize}pt, ${s.titleAlign}, ${s.titlePos}, h-pad ${s.titleHPad}
- Title bar: color ${s.barColor} @ ${s.barOpacity}% opacity, fade height ${s.fadeHeight}, bar height ${s.barH}, text ${s.textLift}px from bottom

JSON: ${JSON.stringify(s)}`;
  const ok = () => {
    $('copied').textContent = '✓ Copied to clipboard';
    setTimeout(() => $('copied').textContent = '', 2000);
  };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = summary; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove(); ok();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(summary).then(ok).catch(fallback);
  } else fallback();
});

// Persist state in the URL hash so tweaks survive reload and are shareable.
function saveHash() {
  try { location.hash = btoa(JSON.stringify(getState())); } catch (e) {}
}
function loadHash() {
  try {
    if (location.hash.length > 1) { setState(JSON.parse(atob(location.hash.slice(1)))); }
  } catch (e) {}
}
loadHash();
render();
</script>
</body>
</html>
