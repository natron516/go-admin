<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Our bundled font -->
  <dir>/app/assets</dir>
  <!-- System font directories (Debian/Ubuntu) -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/share/fonts/truetype</dir>
  <dir>/usr/local/share/fonts</dir>
  <!-- Font cache directory: must be writable -->
  <cachedir>/app/assets/.fontcache</cachedir>
  <config>
    <rescan><int>30</int></rescan>
  </config>
</fontconfig>
